<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Solicitar Presupuesto</title>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #fdfdfd;
      color: #333;
    }
    header {
      background: #2c2c2c;
      color: #fff;
      padding: 15px 40px;
      text-align: center;
    }
    section {
      padding: 60px 20px;
      max-width: 600px;
      margin: auto;
    }
    h1 {
      text-align: center;
      margin-bottom: 30px;
      color: #2c2c2c;
    }
    form {
      display: flex;
      flex-direction: column;
    }
    form input, form textarea {
      margin-bottom: 15px;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    form button {
      background: #a0522d;
      color: #fff;
      padding: 12px;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    form button:hover { background: #8b4513; }
    .whatsapp {
      text-align: center;
      margin-top: 20px;
    }
    .whatsapp a {
      background: #25d366;
      color: #fff;
      padding: 12px 20px;
      border-radius: 4px;
      text-decoration: none;
      font-weight: bold;
      transition: background 0.3s;
    }
    .whatsapp a:hover { background: #1ebe5d; }
  </style>
</head>
<body>
  <header>
    <h2>Mi Carpintería</h2>
  </header>

  <section>
    <h1>Solicitar Presupuesto</h1>
    <form>
      <input type="text" placeholder="Nombre completo" required>
      <input type="email" placeholder="Correo electrónico" required>
      <input type="tel" placeholder="Número de contacto" required>
      <textarea placeholder="¿Qué tipo de mueble o trabajo desea consultar?" rows="6" required></textarea>
      <button type="submit">Enviar solicitud</button>
    </form>

    <div class="whatsapp">
      <a href="https://wa.me/549XXXXXXXXXX" target="_blank">Contactar por WhatsApp</a>
    </div>
  </section>
</body>
</html>
