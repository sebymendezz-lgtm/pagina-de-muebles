<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Catálogo de Muebles</title>
  <style>
    body {
      margin: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      background-color: #fdfdfd;
      color: #333;
    }
    header {
      background: #2c2c2c;
      color: #fff;
      padding: 15px 40px;
      text-align: center;
    }
    section {
      padding: 60px 20px;
      max-width: 1200px;
      margin: auto;
    }
    h2 {
      text-align: center;
      margin-bottom: 40px;
      font-size: 2rem;
      color: #2c2c2c;
    }
    .galeria {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .galeria img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      transition: transform 0.3s;
    }
    .galeria img:hover {
      transform: scale(1.05);
    }
    footer {
      background: #2c2c2c;
      color: #fff;
      text-align: center;
      padding: 20px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Catálogo de Muebles</h1>
    <p>Explora nuestros trabajos realizados en diferentes ambientes</p>
  </header>

  <!-- Baño -->
  <section id="bano">
    <h2>Muebles de Baño</h2>
    <div class="galeria">
      <img src="bano1.jpg" alt="Mueble de baño 1">
      <img src="bano2.jpg" alt="Mueble de baño 2">
      <img src="bano3.jpg" alt="Mueble de baño 3">
    </div>
  </section>

  <!-- Cocina -->
  <section id="cocina">
    <h2>Muebles de Cocina</h2>
    <div class="galeria">
      <img src="cocina1.jpg" alt="Mueble de cocina 1">
      <img src="cocina2.jpg" alt="Mueble de cocina 2">
      <img src="cocina3.jpg" alt="Mueble de cocina 3">
    </div>
  </section>

  <!-- Living -->
  <section id="living">
    <h2>Muebles de Living</h2>
    <div class="galeria">
      <img src="living1.jpg" alt="Mueble de living 1">
      <img src="living2.jpg" alt="Mueble de living 2">
      <img src="living3.jpg" alt="Mueble de living 3">
    </div>
  </section>

  <!-- Oficina -->
  <section id="oficina">
    <h2>Muebles de Oficina</h2>
    <div class="galeria">
      <img src="oficina1.jpg" alt="Mueble de oficina 1">
      <img src="oficina2.jpg" alt="Mueble de oficina 2">
      <img src="oficina3.jpg" alt="Mueble de oficina 3">
    </div>
  </section>

  <!-- Dormitorio -->
  <section id="dormitorio">
    <h2>Muebles de Dormitorio</h2>
    <div class="galeria">
      <img src="dormitorio1.jpg" alt="Mueble de dormitorio 1">
      <img src="dormitorio2.jpg" alt="Mueble de dormitorio 2">
      <img src="dormitorio3.jpg" alt="Mueble de dormitorio 3">
    </div>
  </section>

  <footer>
    <p>© 2026 Mi Carpintería - Catálogo de trabajos realizados</p>
  </footer>
</body>
</html>
